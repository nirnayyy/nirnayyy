<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vignette Bloom — ASCII Mosaic Renderer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', system-ui, sans-serif;
      color: #e0e0e0;
    }
    h1 {
      margin-top: 24px;
      font-size: 1.2rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #555;
      font-weight: 300;
    }
    #renderCanvas {
      margin: 24px auto;
      border-radius: 8px;
      box-shadow: 0 0 60px rgba(60,166,255,0.08);
    }
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }
    .controls button {
      background: #1a1a2e;
      color: #10b981;
      border: 1px solid #10b98133;
      padding: 10px 24px;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: all 0.2s;
    }
    .controls button:hover {
      background: #10b98118;
      border-color: #10b981;
    }
  </style>
</head>
<body>
  <h1>Vignette Bloom — Mosaic Renderer</h1>
  <canvas id="renderCanvas"></canvas>
  <div class="controls">
    <button id="btnSave">💾 Save PNG Frame</button>
    <button id="btnSaveBanner">📐 Save as Banner (1200×400)</button>
  </div>

  <script>
  (() => {
    // ═══════════════════════════════════════════════════════════════
    // CONFIGURATION — matches the full JSON spec from the prompt
    // ═══════════════════════════════════════════════════════════════
    const CONFIG = {
      renderMode: "mosaic",
      bgMode: "solid",
      bgBlur: 12,
      bgOpacity: 90,
      cellSize: 16,
      coverage: 100,
      invert: false,
      brightness: 12,
      contrast: 115,
      saturation: 100,
      grayscale: 0,
      tint: "#3ca6ff",
      tintOpacity: 0,
      overlayBlend: "multiply",
      blurType: "off",
      blurAmount: 35,
      edgeEmphasis: 0,
      density: 0,
      pfx: {
        vignette: { enabled: true, intensity: 38 },
        bloom:    { enabled: true, intensity: 25 },
        scanLines:  { enabled: false, intensity: 40 },
        chromatic:  { enabled: false, intensity: 15 },
        filmGrain:  { enabled: false, intensity: 30 },
        glitch:     { enabled: false, intensity: 20 },
        pixelate:   { enabled: false, intensity: 15 },
        halftone:   { enabled: false, intensity: 20 },
        filmDust:   { enabled: false, intensity: 20 },
      },
      animated: true,
      animStyle: "wave",
      animSpeed: 100,
      animIntensity: 60,
    };

    // ═══════════════════════════════════════════════════════════════
    // GLOBALS
    // ═══════════════════════════════════════════════════════════════
    const canvas = document.getElementById("renderCanvas");
    const ctx = canvas.getContext("2d");
    let sourceImg = null;
    let sourceData = null;     // ImageData from the source photo
    let srcCanvas = null;      // offscreen canvas for source
    let gridCells = [];        // array of { x, y, r, g, b, lum }
    let W = 0, H = 0;
    let startTime = 0;

    // ═══════════════════════════════════════════════════════════════
    // 1. LOAD SOURCE IMAGE
    // ═══════════════════════════════════════════════════════════════
    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    // ═══════════════════════════════════════════════════════════════
    // 2. SAMPLE GRID — divide canvas into cellSize cells
    // ═══════════════════════════════════════════════════════════════
    function sampleGrid(imgData, w, h, cellSize) {
      const cells = [];
      const d = imgData.data;
      const cols = Math.ceil(w / cellSize);
      const rows = Math.ceil(h / cellSize);

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const x0 = col * cellSize;
          const y0 = row * cellSize;
          const x1 = Math.min(x0 + cellSize, w);
          const y1 = Math.min(y0 + cellSize, h);
          let rSum = 0, gSum = 0, bSum = 0, count = 0;

          for (let py = y0; py < y1; py++) {
            for (let px = x0; px < x1; px++) {
              const idx = (py * w + px) * 4;
              rSum += d[idx];
              gSum += d[idx + 1];
              bSum += d[idx + 2];
              count++;
            }
          }

          const r = rSum / count;
          const g = gSum / count;
          const b = bSum / count;
          const lum = 0.299 * r + 0.587 * g + 0.114 * b;

          cells.push({ col, row, x: x0, y: y0, r, g, b, lum });
        }
      }
      return cells;
    }

    // ═══════════════════════════════════════════════════════════════
    // 3. COLOR ADJUSTMENT HELPERS
    // ═══════════════════════════════════════════════════════════════
    function adjustBrightness(r, g, b, amount) {
      // amount is a value where 0 = no change, positive = brighter
      const factor = 1 + amount / 100;
      return [
        Math.min(255, r * factor),
        Math.min(255, g * factor),
        Math.min(255, b * factor),
      ];
    }

    function adjustContrast(r, g, b, contrastPct) {
      // contrastPct: 100 = no change, >100 = more contrast
      const factor = contrastPct / 100;
      return [
        Math.min(255, Math.max(0, ((r / 255 - 0.5) * factor + 0.5) * 255)),
        Math.min(255, Math.max(0, ((g / 255 - 0.5) * factor + 0.5) * 255)),
        Math.min(255, Math.max(0, ((b / 255 - 0.5) * factor + 0.5) * 255)),
      ];
    }

    function adjustSaturation(r, g, b, satPct) {
      const s = satPct / 100;
      const gray = 0.299 * r + 0.587 * g + 0.114 * b;
      return [
        Math.min(255, Math.max(0, gray + (r - gray) * s)),
        Math.min(255, Math.max(0, gray + (g - gray) * s)),
        Math.min(255, Math.max(0, gray + (b - gray) * s)),
      ];
    }

    function applyGrayscale(r, g, b, amount) {
      // amount 0-100, 0 = no change, 100 = full grayscale
      const gray = 0.299 * r + 0.587 * g + 0.114 * b;
      const t = amount / 100;
      return [
        r + (gray - r) * t,
        g + (gray - g) * t,
        b + (gray - b) * t,
      ];
    }

    function processColor(r, g, b) {
      // Step 4: Apply color adjustments in order
      [r, g, b] = adjustBrightness(r, g, b, CONFIG.brightness);
      [r, g, b] = adjustContrast(r, g, b, CONFIG.contrast);
      [r, g, b] = adjustSaturation(r, g, b, CONFIG.saturation);
      [r, g, b] = applyGrayscale(r, g, b, CONFIG.grayscale);

      // Tint (if tintOpacity > 0)
      if (CONFIG.tintOpacity > 0) {
        const tintR = parseInt(CONFIG.tint.slice(1,3), 16);
        const tintG = parseInt(CONFIG.tint.slice(3,5), 16);
        const tintB = parseInt(CONFIG.tint.slice(5,7), 16);
        const t = CONFIG.tintOpacity / 100;
        // Multiply blend
        if (CONFIG.overlayBlend === "multiply") {
          r = r * (1 - t) + (r * tintR / 255) * t;
          g = g * (1 - t) + (g * tintG / 255) * t;
          b = b * (1 - t) + (b * tintB / 255) * t;
        } else {
          r = r * (1 - t) + tintR * t;
          g = g * (1 - t) + tintG * t;
          b = b * (1 - t) + tintB * t;
        }
      }

      return [Math.round(r), Math.round(g), Math.round(b)];
    }

    // ═══════════════════════════════════════════════════════════════
    // 4. ANIMATION FUNCTIONS
    // ═══════════════════════════════════════════════════════════════
    function getWaveOffset(col, row, time, cols, rows) {
      const speed = CONFIG.animSpeed / 100;
      const intensity = CONFIG.animIntensity / 100;
      const maxOffset = CONFIG.cellSize * 0.35 * intensity;
      const freq = 0.15;

      const phase = (col + row) * freq - time * speed * 2;
      const dx = Math.sin(phase) * maxOffset;
      const dy = Math.cos(phase * 0.7 + 0.5) * maxOffset * 0.6;

      return { dx, dy };
    }

    function getWaveScale(col, row, time) {
      const speed = CONFIG.animSpeed / 100;
      const intensity = CONFIG.animIntensity / 100;
      const phase = (col - row) * 0.12 + time * speed * 1.5;
      return 1 + Math.sin(phase) * 0.08 * intensity;
    }

    function getWaveAlpha(col, row, time) {
      const speed = CONFIG.animSpeed / 100;
      const intensity = CONFIG.animIntensity / 100;
      const phase = (col + row * 0.5) * 0.1 + time * speed * 1.2;
      return 0.85 + Math.sin(phase) * 0.15 * intensity;
    }

    // ═══════════════════════════════════════════════════════════════
    // 5. POST-EFFECTS
    // ═══════════════════════════════════════════════════════════════

    // Vignette: radial darkening from edges
    function applyVignette(ctx, w, h, intensity) {
      const strength = intensity / 100;
      const cx = w / 2;
      const cy = h / 2;
      const radius = Math.sqrt(cx * cx + cy * cy);

      const gradient = ctx.createRadialGradient(cx, cy, radius * 0.3, cx, cy, radius);
      gradient.addColorStop(0, `rgba(0,0,0,0)`);
      gradient.addColorStop(0.5, `rgba(0,0,0,${0.1 * strength})`);
      gradient.addColorStop(0.8, `rgba(0,0,0,${0.4 * strength})`);
      gradient.addColorStop(1, `rgba(0,0,0,${0.85 * strength})`);

      ctx.save();
      ctx.globalCompositeOperation = "multiply";
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, w, h);
      ctx.restore();
    }

    // Bloom: extract bright areas and composite a blurred glow
    function applyBloom(ctx, w, h, intensity) {
      const strength = intensity / 100;

      // Read the current canvas
      const imgData = ctx.getImageData(0, 0, w, h);
      const d = imgData.data;

      // Create a bloom layer — extract only bright pixels
      const bloomCanvas = document.createElement("canvas");
      bloomCanvas.width = w;
      bloomCanvas.height = h;
      const bCtx = bloomCanvas.getContext("2d");
      const bloomData = bCtx.createImageData(w, h);
      const bd = bloomData.data;

      const threshold = 140;
      for (let i = 0; i < d.length; i += 4) {
        const lum = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
        if (lum > threshold) {
          const t = (lum - threshold) / (255 - threshold);
          bd[i]   = d[i]   * t;
          bd[i+1] = d[i+1] * t;
          bd[i+2] = d[i+2] * t;
          bd[i+3] = 255;
        } else {
          bd[i+3] = 0;
        }
      }
      bCtx.putImageData(bloomData, 0, 0);

      // Apply Gaussian blur to bloom layer via multiple passes
      const blurRadius = Math.round(12 * strength);
      if (blurRadius > 0) {
        bCtx.filter = `blur(${blurRadius}px)`;
        bCtx.drawImage(bloomCanvas, 0, 0);
        bCtx.filter = `blur(${blurRadius}px)`;
        bCtx.drawImage(bloomCanvas, 0, 0);
      }

      // Composite bloom over original
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.globalAlpha = 0.5 * strength + 0.2;
      ctx.drawImage(bloomCanvas, 0, 0);
      ctx.restore();
    }

    // ═══════════════════════════════════════════════════════════════
    // 6. MAIN RENDER LOOP
    // ═══════════════════════════════════════════════════════════════
    function renderFrame(time) {
      const cs = CONFIG.cellSize;

      // Clear with solid dark background
      ctx.fillStyle = "#050706";
      ctx.fillRect(0, 0, W, H);

      // Optionally draw blurred/dimmed background photo
      if (CONFIG.bgMode === "photo" || CONFIG.bgMode === "blur") {
        ctx.save();
        ctx.globalAlpha = CONFIG.bgOpacity / 100;
        if (CONFIG.bgMode === "blur") {
          ctx.filter = `blur(${CONFIG.bgBlur}px)`;
        }
        ctx.drawImage(srcCanvas, 0, 0, W, H);
        ctx.restore();
      }

      // Draw mosaic cells
      const cols = Math.ceil(W / cs);
      const rows = Math.ceil(H / cs);
      const centerCol = cols / 2;
      const centerRow = rows / 2;

      for (const cell of gridCells) {
        // Coverage check
        if (CONFIG.coverage < 100) {
          const hash = (cell.col * 7 + cell.row * 13) % 100;
          if (hash >= CONFIG.coverage) continue;
        }

        // Get animation offsets
        let dx = 0, dy = 0, scale = 1, alpha = 1;
        if (CONFIG.animated) {
          const offsets = getWaveOffset(cell.col, cell.row, time, cols, rows);
          dx = offsets.dx;
          dy = offsets.dy;
          scale = getWaveScale(cell.col, cell.row, time);
          alpha = getWaveAlpha(cell.col, cell.row, time);
        }

        // Process color
        let [r, g, b] = processColor(cell.r, cell.g, cell.b);

        // Invert if needed
        if (CONFIG.invert) {
          r = 255 - r;
          g = 255 - g;
          b = 255 - b;
        }

        const lumNorm = cell.lum / 255;

        // Per-cell distance dimming
        const distCol = (cell.col - centerCol) / centerCol;
        const distRow = (cell.row - centerRow) / centerRow;
        const dist = Math.sqrt(distCol * distCol + distRow * distRow);
        const dimFactor = Math.max(0.15, 1 - dist * 0.6);

        // Darken bright background cells
        if (lumNorm > 0.7) {
          const bgBlend = (lumNorm - 0.7) / 0.3;
          const darkR = 12, darkG = 15, darkB = 14;
          r = r * (1 - bgBlend * 0.7) + darkR * (bgBlend * 0.7);
          g = g * (1 - bgBlend * 0.7) + darkG * (bgBlend * 0.7);
          b = b * (1 - bgBlend * 0.7) + darkB * (bgBlend * 0.7);
        }

        // Apply distance dimming
        r *= dimFactor;
        g *= dimFactor;
        b *= dimFactor;

        // Calculate cell size based on luminance (mosaic: near-full fill)
        const fillRatio = 0.75 + lumNorm * 0.2;  // mosaic fills most of the cell
        const size = cs * fillRatio * scale;
        const gap = (cs - size) / 2;

        // Draw rounded rectangle
        const x = cell.x + gap + dx;
        const y = cell.y + gap + dy;
        const cornerRadius = Math.max(1, size * 0.15);

        ctx.save();
        ctx.globalAlpha = Math.min(1, Math.max(0.3, alpha * dimFactor));
        ctx.fillStyle = `rgb(${Math.round(r)}, ${Math.round(g)}, ${Math.round(b)})`;

        // Rounded rect path
        ctx.beginPath();
        ctx.moveTo(x + cornerRadius, y);
        ctx.lineTo(x + size - cornerRadius, y);
        ctx.arcTo(x + size, y, x + size, y + cornerRadius, cornerRadius);
        ctx.lineTo(x + size, y + size - cornerRadius);
        ctx.arcTo(x + size, y + size, x + size - cornerRadius, y + size, cornerRadius);
        ctx.lineTo(x + cornerRadius, y + size);
        ctx.arcTo(x, y + size, x, y + size - cornerRadius, cornerRadius);
        ctx.lineTo(x, y + cornerRadius);
        ctx.arcTo(x, y, x + cornerRadius, y, cornerRadius);
        ctx.closePath();
        ctx.fill();

        // Subtle highlight on face-area cells
        if (lumNorm > 0.4 && lumNorm < 0.75) {
          const highlightAlpha = (lumNorm - 0.4) * 0.15;
          ctx.fillStyle = `rgba(255, 255, 255, ${highlightAlpha * alpha})`;
          ctx.fill();
        }

        ctx.restore();
      }

      // ── POST-EFFECTS ──────────────────────────────────────────
      if (CONFIG.pfx.vignette.enabled) {
        applyVignette(ctx, W, H, CONFIG.pfx.vignette.intensity);
      }
      if (CONFIG.pfx.bloom.enabled) {
        applyBloom(ctx, W, H, CONFIG.pfx.bloom.intensity);
      }
    }

    // ═══════════════════════════════════════════════════════════════
    // 7. ANIMATION LOOP
    // ═══════════════════════════════════════════════════════════════
    function animate(timestamp) {
      if (!startTime) startTime = timestamp;
      const elapsed = (timestamp - startTime) / 1000; // seconds

      renderFrame(elapsed);
      requestAnimationFrame(animate);
    }

    // ═══════════════════════════════════════════════════════════════
    // 8. SAVE FUNCTIONS
    // ═══════════════════════════════════════════════════════════════
    function savePNG() {
      const link = document.createElement("a");
      link.download = "ascii-mosaic.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    function saveBanner() {
      // Render a 1200x400 cropped banner version
      const bannerW = 1200;
      const bannerH = 400;
      const bannerCanvas = document.createElement("canvas");
      bannerCanvas.width = bannerW;
      bannerCanvas.height = bannerH;
      const bCtx = bannerCanvas.getContext("2d");

      // Calculate crop region (center crop from the rendered canvas)
      const srcAspect = W / H;
      const bannerAspect = bannerW / bannerH;

      let sx, sy, sw, sh;
      if (srcAspect > bannerAspect) {
        // Source is wider — crop sides
        sh = H;
        sw = H * bannerAspect;
        sx = (W - sw) / 2;
        sy = 0;
      } else {
        // Source is taller — crop top/bottom (focus on face area, upper-center)
        sw = W;
        sh = W / bannerAspect;
        sx = 0;
        sy = Math.max(0, (H * 0.3) - sh * 0.3); // Bias upward for face
      }

      bCtx.drawImage(canvas, sx, sy, sw, sh, 0, 0, bannerW, bannerH);

      const link = document.createElement("a");
      link.download = "ascii-mosaic-banner.png";
      link.href = bannerCanvas.toDataURL("image/png");
      link.click();
    }

    // ═══════════════════════════════════════════════════════════════
    // 9. INIT
    // ═══════════════════════════════════════════════════════════════
    async function init() {
      try {
        // Try loading from relative path (for local dev)
        sourceImg = await loadImage("../myself.png").catch(() =>
          loadImage("../../myself.png").catch(() =>
            loadImage("myself.png")
          )
        );
      } catch (e) {
        console.error("Could not load source image. Place 'myself.png' adjacent to this file or in parent directories.");
        ctx.fillStyle = "#222";
        ctx.fillRect(0, 0, 600, 400);
        ctx.fillStyle = "#f44";
        ctx.font = "16px monospace";
        ctx.fillText("Error: Could not load source image", 40, 200);
        return;
      }

      // Set canvas size to match image (cap at reasonable size)
      const maxDim = 800;
      const scale = Math.min(1, maxDim / Math.max(sourceImg.width, sourceImg.height));
      W = Math.round(sourceImg.width * scale);
      H = Math.round(sourceImg.height * scale);

      // Ensure dimensions are multiples of cellSize for clean grid
      W = Math.ceil(W / CONFIG.cellSize) * CONFIG.cellSize;
      H = Math.ceil(H / CONFIG.cellSize) * CONFIG.cellSize;

      canvas.width = W;
      canvas.height = H;

      // Draw source to offscreen canvas and sample
      srcCanvas = document.createElement("canvas");
      srcCanvas.width = W;
      srcCanvas.height = H;
      const sCtx = srcCanvas.getContext("2d");
      sCtx.drawImage(sourceImg, 0, 0, W, H);
      sourceData = sCtx.getImageData(0, 0, W, H);

      // Sample grid cells
      gridCells = sampleGrid(sourceData, W, H, CONFIG.cellSize);

      // Wire up buttons
      document.getElementById("btnSave").addEventListener("click", savePNG);
      document.getElementById("btnSaveBanner").addEventListener("click", saveBanner);

      // Start animation
      requestAnimationFrame(animate);
    }

    init();
  })();
  </script>
</body>
</html>
